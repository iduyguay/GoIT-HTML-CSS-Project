<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/GoIT-HTML-CSS-Project/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Takım Projesi</title>
    <script type="module" crossorigin src="/GoIT-HTML-CSS-Project/index.js"></script>
    <link rel="stylesheet" crossorigin href="/GoIT-HTML-CSS-Project/assets/index-BsAlSKXW.css">
  </head>
  <body>
    

    <main>
      <section class="hero section" id="hero">
  <div class="container">
    <div class="hero-content">
      <h1>
        Discover the magic of <span class="highlight">photography</span> in our
        school
      </h1>
      <p>
        Our photography school offers an unforgettable journey, where you can
        learn the basics of composition, master technical skills, translate your
        unique ideas.
      </p>

      <div class="students-block">
        <div class="students-left">
          <div class="avatars">
            <img src="../img/girl-1.png" alt="Portrait of a female student" />
            <img src="../img/boy.png" alt="Portrait of a male student" />
            <img
              src="../img/girl.png"
              alt="Portrait of another female student"
            />
          </div>
          <a href="#reviews" class="students-link"
            >Our happy students <span class="arrow">→</span></a
          >
        </div>

        <div class="reviews">
          <div class="star">
            <img src="../img/star.svg" alt="" aria-hidden="true" />
          </div>
          <div class="review-text">
            <p>Reviews</p>
            <p class="count">+1500</p>
          </div>
        </div>
      </div>
    </div>

    <div class="hero-image-container">
      <img
        src="../img/Rectangle.png"
        srcset="../img/Rectangle@2x.png 2x"
        alt="Photographer holding a camera"
      />
    </div>
  </div>
</section>

      
      
      
      
      
      
      
      
      
      
      
      
    </main>

    

  </body>
</html>
